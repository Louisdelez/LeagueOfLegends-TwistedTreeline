<template>
    <property name="hp_pct">100</property>
    <property name="mana_pct">100</property>
    <property name="hp_text">600/600</property>
    <property name="mana_text">400/400</property>
    <property name="gold">850</property>
    <property name="level">1</property>
    <property name="portrait">ui/portraits/annie_circle.png</property>
    <property name="q_icon">ui/abilities/annie_q.png</property>
    <property name="w_icon">ui/abilities/annie_w.png</property>
    <property name="e_icon">ui/abilities/annie_e.png</property>
    <property name="r_icon">ui/abilities/annie_r1.png</property>
    <property name="spell_d">ui/spells/summoner_flash.png</property>
    <property name="spell_f">ui/spells/summonerignite.png</property>
    <property name="q_cd"></property>
    <property name="w_cd"></property>
    <property name="e_cd"></property>
    <property name="r_cd"></property>
    <property name="kda">0/0/0</property>
    <property name="cs">0</property>
    <property name="game_time">0:00</property>

    <node width="100%" height="100%">

        <!-- TOP RIGHT BAR -->
        <node position="absolute" top="0%" right="0%" height="34px"
              background="#010810" padding="5px 25px" column_gap="25px" align_items="center">
            <node column_gap="6px" align_items="center">
                <text font_size="18" font_color="#33cc55">0</text>
                <text font_size="14" font_color="#777">vs</text>
                <text font_size="18" font_color="#ee3333">0</text>
            </node>
            <node column_gap="5px" align_items="center">
                <text font_size="14" font_color="#55cc55">⚔</text>
                <text font_size="16" font_color="#eee">0/0/0</text>
            </node>
            <node column_gap="5px" align_items="center">
                <text font_size="14" font_color="#ddaa33">⬡</text>
                <text font_size="16" font_color="#eee">0</text>
            </node>
            <node column_gap="5px" align_items="center">
                <text font_size="14" font_color="#99b">⏱</text>
                <text font_size="16" font_color="#ccc">0:00</text>
            </node>
        </node>

        <!-- HUD BACKGROUND — centered -->
        <node position="absolute" bottom="0%" left="50%" margin="0 0 0 -19%" width="38%" height="16%"
              background="#010a13" border="2px 0 0 0" border_color="#c8aa6e" />

        <!-- PORTRAIT -->
        <node position="absolute" bottom="2%" left="31%" flex_direction="column" align_items="center">
            <image src="{portrait}" width="90px" height="90px" border="3px" border_color="#c8aa6e" />
            <node width="28px" height="20px" background="#010a13" border="2px" border_color="#c8aa6e"
                  justify_content="center" align_items="center" margin="-9px 0 0 0">
                <text font_size="14" font_color="#cdbe91">{level}</text>
            </node>
        </node>

        <!-- ALL SPELLS IN ONE ROW: Q W E R D F — all same size -->
        <node position="absolute" bottom="7%" left="38%" column_gap="3px" align_items="center">
            <node width="48px" height="48px" border="2px" border_color="#463714" background="#02020a">
                <image src="{q_icon}" width="100%" height="100%" />
                <text font_size="10" font_color="#cdbe91" position="absolute" top="1px" left="2px">Q</text>
                <text font_size="16" font_color="#eee" position="absolute" top="14px" left="12px">{q_cd}</text>
            </node>
            <node width="48px" height="48px" border="2px" border_color="#463714" background="#02020a">
                <image src="{w_icon}" width="100%" height="100%" />
                <text font_size="10" font_color="#cdbe91" position="absolute" top="1px" left="2px">W</text>
                <text font_size="16" font_color="#eee" position="absolute" top="14px" left="12px">{w_cd}</text>
            </node>
            <node width="48px" height="48px" border="2px" border_color="#463714" background="#02020a">
                <image src="{e_icon}" width="100%" height="100%" />
                <text font_size="10" font_color="#cdbe91" position="absolute" top="1px" left="2px">E</text>
                <text font_size="16" font_color="#eee" position="absolute" top="14px" left="12px">{e_cd}</text>
            </node>
            <node width="48px" height="48px" border="2px" border_color="#c8aa6e" background="#02020a">
                <image src="{r_icon}" width="100%" height="100%" />
                <text font_size="10" font_color="#cdbe91" position="absolute" top="1px" left="2px">R</text>
                <text font_size="16" font_color="#eee" position="absolute" top="14px" left="12px">{r_cd}</text>
            </node>
            <node width="48px" height="48px" border="2px" border_color="#463714" background="#02020a">
                <image src="{spell_d}" width="100%" height="100%" />
                <text font_size="10" font_color="#cdbe91" position="absolute" top="1px" left="2px">D</text>
            </node>
            <node width="48px" height="48px" border="2px" border_color="#463714" background="#02020a">
                <image src="{spell_f}" width="100%" height="100%" />
                <text font_size="10" font_color="#cdbe91" position="absolute" top="1px" left="2px">F</text>
            </node>
        </node>

        <!-- HP BAR — same width as spells row above (6 * 51px = ~306px) -->
        <node position="absolute" bottom="3.5%" left="38%" width="306px" height="20px"
              background="#2a0a0a" border="1px" border_color="#1e2328">
            <node width="{hp_pct}%" height="100%" background="#2dbe34" min_width="0px"
                  justify_content="center" align_items="center">
                <text font_size="12" font_color="#fff">{hp_text}</text>
            </node>
        </node>

        <!-- MANA BAR — same width, below HP -->
        <node position="absolute" bottom="1.5%" left="38%" width="306px" height="16px"
              background="#0a0a2a" border="1px" border_color="#1e2328">
            <node width="{mana_pct}%" height="100%" background="#2196f3" min_width="0px"
                  justify_content="center" align_items="center">
                <text font_size="10" font_color="#fff">{mana_text}</text>
            </node>
        </node>

        <!-- INVENTORY 3x2 — right next to spells, no gap -->
        <node position="absolute" bottom="3%" left="56%" flex_direction="column" row_gap="2px">
            <node column_gap="2px">
                <node width="38px" height="38px" background="#1e2328" border="1px" border_color="#463714" />
                <node width="38px" height="38px" background="#1e2328" border="1px" border_color="#463714" />
                <node width="38px" height="38px" background="#1e2328" border="1px" border_color="#463714" />
            </node>
            <node column_gap="2px">
                <node width="38px" height="38px" background="#1e2328" border="1px" border_color="#463714" />
                <node width="38px" height="38px" background="#1e2328" border="1px" border_color="#463714" />
                <node width="38px" height="38px" background="#1e2328" border="1px" border_color="#463714" />
            </node>
        </node>

        <!-- GOLD -->
        <node position="absolute" bottom="5%" left="64%">
            <text font_size="20" font_color="#cdbe91">{gold}</text>
        </node>

        <!-- MINIMAP -->
        <node position="absolute" bottom="0.5%" right="0.5%">
            <image src="ui/minimap.png" width="270px" height="270px" border="3px" border_color="#c8aa6e" />
        </node>

    </node>
</template>
